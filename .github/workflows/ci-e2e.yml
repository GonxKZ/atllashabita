name: ci-e2e

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-e2e.yml'
  push:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright flujo principal
    runs-on: ubuntu-latest
    if: hashFiles('apps/web/tests/e2e/**/*.ts') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Instalar backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
      - name: Instalar frontend
        working-directory: apps/web
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Instalar navegadores Playwright
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Arrancar backend en segundo plano
        run: |
          nohup uvicorn atlashabita.interfaces.api:create_app --factory --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
      - name: Ejecutar Playwright
        working-directory: apps/web
        run: pnpm e2e
      - name: Publicar reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

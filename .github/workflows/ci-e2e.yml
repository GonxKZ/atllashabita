name: ci-e2e

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-e2e.yml'
  push:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-e2e.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright flujo principal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detectar pruebas Playwright
        id: detect
        run: |
          if compgen -G "apps/web/tests/e2e/*.ts" > /dev/null || compgen -G "apps/web/tests/e2e/*.spec.ts" > /dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "Sin pruebas E2E todavía; el workflow finaliza como OK."
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.has_tests == 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.has_tests == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_tests == 'true'
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Instalar backend
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Instalar frontend
        if: steps.detect.outputs.has_tests == 'true'
        working-directory: apps/web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Instalar navegadores de Playwright
        if: steps.detect.outputs.has_tests == 'true'
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Arrancar API en segundo plano
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          nohup uvicorn atlashabita.interfaces.api:create_app --factory --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "API disponible"; break
            fi
            sleep 1
          done

      - name: Ejecutar Playwright
        if: steps.detect.outputs.has_tests == 'true'
        working-directory: apps/web
        run: pnpm e2e

      - name: Publicar reporte Playwright
        if: always() && steps.detect.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 14

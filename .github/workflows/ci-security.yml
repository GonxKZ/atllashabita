name: ci-security

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Escaneo de secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Buscar patrones sensibles
        run: |
          set -euo pipefail
          patterns='(ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH) PRIVATE KEY-----)'
          if git grep -InE "${patterns}" -- ':!*.lock' ':!scripts/_bootstrap/*' ':!**/package-lock.json' ':!**/pnpm-lock.yaml' ':!**/uv.lock' 2>/dev/null; then
            echo "::error::Se detectaron posibles secretos"
            exit 1
          fi

  backend-audit:
    name: pip-audit y bandit
    runs-on: ubuntu-latest
    if: hashFiles('apps/api/pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit
      - name: Instalar dependencias del API
        working-directory: apps/api
        run: |
          python -m pip install -e .[dev]
      - name: pip-audit
        working-directory: apps/api
        run: pip-audit --strict --ignore-vuln GHSA-none || pip-audit --strict
      - name: bandit
        working-directory: apps/api
        run: bandit -r src -ll

  frontend-audit:
    name: npm audit
    runs-on: ubuntu-latest
    if: hashFiles('apps/web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Instalar
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Auditoría
        working-directory: apps/web
        run: pnpm audit --prod --audit-level=high

name: ci-security

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Escaneo de secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Buscar patrones sensibles en el histórico reciente
        run: |
          set -euo pipefail
          patron='(ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC) PRIVATE KEY-----)'
          if git grep -InE "$patron" \
              -- ':!*.lock' \
                 ':!scripts/_bootstrap/*' \
                 ':!**/package-lock.json' \
                 ':!**/pnpm-lock.yaml' \
                 ':!**/uv.lock' 2>/dev/null; then
            echo "::error::Se detectaron posibles secretos en el árbol actual"
            exit 1
          fi

  backend-audit:
    name: pip-audit y bandit sobre el backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Instalar backend y herramientas de auditoría
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit
          python -m pip install -e "apps/api[dev]"
      - name: pip-audit
        run: pip-audit --strict
      - name: bandit
        run: bandit -r apps/api/src -ll

  frontend-audit:
    name: pnpm audit sobre el frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Instalar dependencias
        working-directory: apps/web
        run: pnpm install --no-frozen-lockfile
      - name: Auditoría productiva (no bloqueante)
        working-directory: apps/web
        continue-on-error: true
        run: pnpm audit --prod --audit-level=high

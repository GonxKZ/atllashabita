name: ci-rdf

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
    paths:
      - 'ontology/**'
      - 'apps/api/src/atlashabita/infrastructure/rdf/**'
      - '.github/workflows/ci-rdf.yml'
  push:
    branches: [develop, main]
    paths:
      - 'ontology/**'
      - 'apps/api/src/atlashabita/infrastructure/rdf/**'
      - '.github/workflows/ci-rdf.yml'

permissions:
  contents: read

jobs:
  validar-ontologia:
    name: Validar ontología y shapes SHACL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Instalar RDFLib y pySHACL
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rdflib>=7.1" "pyshacl>=0.27"
      - name: Parsear ontología y shapes disponibles
        run: |
          python - <<'PY'
          from pathlib import Path
          from rdflib import Graph

          targets = [p for p in Path("ontology").glob("*.ttl") if p.is_file()]
          if not targets:
              print("Ontología todavía sin ficheros TTL. Nada que validar.")
              raise SystemExit(0)

          total = 0
          for ttl in targets:
              g = Graph()
              g.parse(ttl, format="turtle")
              print(f"{ttl}: {len(g)} tripletas")
              total += len(g)
          print(f"TOTAL tripletas en ontology/: {total}")
          PY

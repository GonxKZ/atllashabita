name: ci-backend

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  calidad:
    name: Lint, tipos y pruebas del backend
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Instalar dependencias del backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Ejecutar ruff (lint)
        run: ruff check apps/api/src apps/api/tests

      - name: Ejecutar ruff (formato)
        run: ruff format --check apps/api/src apps/api/tests

      - name: Ejecutar mypy
        run: mypy apps/api/src

      - name: Ejecutar pytest con cobertura
        run: pytest apps/api/tests --cov=atlashabita --cov-report=xml --cov-report=term

      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-backend-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

name: ci-quality

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validar mensajes de commit de la PR
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          # --no-merges evita inspeccionar commits de fusión generados por GitHub
          # cuando se mergean PR intermedias hacia develop/main.
          commits=$(git log --no-merges --format="%s" "${base_sha}..${head_sha}")
          if [ -z "${commits}" ]; then
            echo "Sin commits nuevos tras descartar los de fusión"
            exit 0
          fi
          invalid=0
          patron='^(feat|fix|refactor|perf|test|docs|chore|ci|build|style|revert)(\([a-z0-9-]+\))?!?: .+'
          merge_pattern='^Merge (PR|branch|pull request|remote-tracking) '
          while IFS= read -r mensaje; do
            if [[ "${mensaje}" =~ ${merge_pattern} ]]; then
              continue
            fi
            if ! [[ "${mensaje}" =~ ${patron} ]]; then
              echo "::error title=Commit inválido::${mensaje}"
              invalid=1
            fi
          done <<<"${commits}"
          exit ${invalid}

  validar-autoria-unica:
    name: Validar autoría única
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Comprobar que no hay coautores adicionales
        env:
          PATRON_BLOQUEO: 'co-authored-by|generated with'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          incidencias=$(git log "${base_sha}..${head_sha}" --format='%B' \
                | grep -iE "${PATRON_BLOQUEO}" || true)
          if [ -n "${incidencias}" ]; then
            echo "::error::Se detectaron coautores adicionales en los commits"
            echo "${incidencias}"
            exit 1
          fi

name: ci-build

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-build.yml'
  push:
    branches: [develop, main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/ci-build.yml'

permissions:
  contents: read

jobs:
  build-web:
    name: Build producción del frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Instalar dependencias
        working-directory: apps/web
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Compilar bundle de producción
        working-directory: apps/web
        run: pnpm build
      - name: Publicar artefacto web-dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 14

  build-api:
    name: Build del paquete backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Preparar herramientas de build
        run: |
          python -m pip install --upgrade pip build hatchling
      - name: Construir wheel y sdist
        working-directory: apps/api
        run: python -m build --wheel --sdist
      - name: Publicar artefactos api-dist
        uses: actions/upload-artifact@v4
        with:
          name: api-dist-${{ github.run_id }}
          path: apps/api/dist
          if-no-files-found: error
          retention-days: 14

name: Error
description: Reportar un defecto en el sistema.
title: "[Bug] <título breve>"
labels: ["tipo:bug", "estado:ready"]
body:
  - type: textarea
    id: resumen
    attributes:
      label: Resumen
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: textarea
    id: observado
    attributes:
      label: Comportamiento observado
    validations:
      required: true
  - type: textarea
    id: entorno
    attributes:
      label: Entorno
      description: Versión, sistema operativo, navegador, rama.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: atlashabita-api:dev
    container_name: atlashabita-api
    environment:
      ATLASHABITA_ENV: development
      ATLASHABITA_CORS_ALLOW_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ontology:/app/ontology
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8000/health\").status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: atlashabita-web:dev
    container_name: atlashabita-web
    environment:
      VITE_API_BASE: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  # Servicio Fuseki opcional; se levanta sólo con ``--profile fuseki``.
  # Expone SPARQL 1.1 y persiste los triples en el volumen ``fuseki-data``.
  fuseki:
    profiles: ["fuseki"]
    build:
      context: docker/fuseki
      dockerfile: Dockerfile
    image: atlashabita-fuseki:dev
    container_name: atlashabita-fuseki
    environment:
      ADMIN_PASSWORD: admin
      FUSEKI_DATASET_NAME: atlashabita
      JVM_ARGS: "-Xmx1g"
    ports:
      - "3030:3030"
    volumes:
      - fuseki-data:/fuseki
      - ./data/rdf:/staging:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  fuseki-data:
    driver: local
